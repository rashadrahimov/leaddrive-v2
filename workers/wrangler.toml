name = "ld-email-inbound"
main = "email-inbound.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Email Routing is bound automatically when the worker is attached
# to a catch-all address in the dashboard. No `routes` entry needed here.

# Set secrets via CLI:
#   wrangler secret put CF_INBOUND_SECRET
# and vars via dashboard or `wrangler.toml`:
#   [vars]
#   API_URL = "https://app.leaddrivecrm.org"
#   FALLBACK_INBOX = "support@leaddrivecrm.org"
[vars]
API_URL = "https://app.leaddrivecrm.org"
FALLBACK_INBOX = "support@leaddrivecrm.org"
