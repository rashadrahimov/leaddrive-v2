name: Fix SSL

on:
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix SSL
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} bash -s << 'SCRIPT'
          echo "=== Update app.leaddrivecrm.org nginx with acme challenge location ==="
          cat > /etc/nginx/sites-available/app.leaddrivecrm.org << 'NGINX'
          server {
              listen 80;
              server_name app.leaddrivecrm.org;

              location /.well-known/acme-challenge/ {
                  root /var/www/html;
              }

              location / {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 86400;
                  client_max_body_size 50M;
                  proxy_buffer_size 128k;
                  proxy_buffers 4 256k;
                  proxy_busy_buffers_size 256k;
              }
          }
          NGINX

          mkdir -p /var/www/html/.well-known/acme-challenge
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Getting SSL cert ==="
          certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos --redirect --webroot-path /var/www/html 2>&1 || \
          certbot certonly --webroot -w /var/www/html -d app.leaddrivecrm.org --non-interactive --agree-tos 2>&1 || \
          certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos 2>&1 || \
          echo "All certbot methods failed"

          echo "=== Reload nginx ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Verify ==="
          curl -sI https://app.leaddrivecrm.org 2>&1 | head -5 || echo "HTTPS not working yet"
          curl -sI http://app.leaddrivecrm.org 2>&1 | head -5

          echo "=== DONE ==="
          SCRIPT
