name: Get SSL Cert

on:
  workflow_dispatch:

jobs:
  cert:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Get cert
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== Temporarily modify leaddrive-v2 port 80 block for certbot ==="
          cp /etc/nginx/sites-available/leaddrive-v2 /etc/nginx/sites-available/leaddrive-v2.bak

          cat > /etc/nginx/sites-available/leaddrive-v2 << 'ENDNGINX'
          server {
              listen 80;
              server_name v2.leaddrivecrm.org app.leaddrivecrm.org;

              location /.well-known/acme-challenge/ {
                  root /var/www/html;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          server {
              listen 443 ssl;
              server_name v2.leaddrivecrm.org app.leaddrivecrm.org;

              ssl_certificate /etc/letsencrypt/live/v2.leaddrivecrm.org/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/v2.leaddrivecrm.org/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

              location /marketing/ {
                  alias /opt/leaddrive-v2/public/marketing/;
                  expires 30d;
                  add_header Cache-Control "public, immutable";
              }

              location / {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 86400;
                  client_max_body_size 50M;
                  proxy_buffer_size 128k;
                  proxy_buffers 4 256k;
                  proxy_busy_buffers_size 256k;
              }
          }
          ENDNGINX

          mkdir -p /var/www/html/.well-known/acme-challenge
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Test acme challenge path ==="
          echo "testok" > /var/www/html/.well-known/acme-challenge/test123
          curl -s http://app.leaddrivecrm.org/.well-known/acme-challenge/test123 2>&1
          curl -s -H "Host: app.leaddrivecrm.org" http://127.0.0.1/.well-known/acme-challenge/test123 2>&1
          rm -f /var/www/html/.well-known/acme-challenge/test123

          echo "=== Get cert with webroot ==="
          certbot certonly --webroot -w /var/www/html -d app.leaddrivecrm.org --non-interactive --agree-tos -m admin@leaddrivecrm.org 2>&1 || echo "Webroot failed, trying nginx plugin"
          certbot --nginx -d v2.leaddrivecrm.org -d app.leaddrivecrm.org --non-interactive --agree-tos --expand 2>&1 || echo "Nginx plugin also failed"

          echo "=== Check cert ==="
          ls /etc/letsencrypt/live/app.leaddrivecrm.org/ 2>/dev/null && echo "Cert exists!" || echo "No cert"
          ls /etc/letsencrypt/live/v2.leaddrivecrm.org*/ 2>/dev/null

          echo "=== Reload ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== DONE ==="
          ENDSCRIPT
