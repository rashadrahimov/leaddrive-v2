name: Add SSH Key

on:
  workflow_dispatch:

jobs:
  add-key:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Add new SSH key
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} bash -s << 'SCRIPT'
          NEW_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL4kzjwjypjHGssxTAoGPGsbd5/fZC/2GsbTxILFmV4B"
          if ! grep -q "$NEW_KEY" ~/.ssh/authorized_keys 2>/dev/null; then
            echo "$NEW_KEY" >> ~/.ssh/authorized_keys
            echo "Key added successfully"
          else
            echo "Key already exists"
          fi
          SCRIPT
