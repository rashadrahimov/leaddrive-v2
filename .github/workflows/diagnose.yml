name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            echo "=== Git status ==="
            cd /opt/leaddrive-v2
            git log --oneline -3
            echo ""
            echo "=== middleware.ts content ==="
            cat src/middleware.ts
            echo ""
            echo "=== Nginx config ==="
            nginx -T 2>&1 | grep -A 30 "leaddrivecrm"
            echo ""
            echo "=== PM2 status ==="
            pm2 list
            echo ""
            echo "=== .next/server/middleware-manifest.json ==="
            cat .next/server/middleware-manifest.json 2>/dev/null | head -20
            echo ""
            echo "=== Check if another middleware exists ==="
            find /opt/leaddrive-v2 -name "middleware.*" -not -path "*/node_modules/*" -not -path "*/.next/*"
          ENDSSH
