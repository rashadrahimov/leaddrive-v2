name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            echo "=== Nginx: leaddrivecrm.org config ==="
            cat /etc/nginx/sites-enabled/leaddrivecrm.org 2>/dev/null || echo "not found"
            echo ""
            echo "=== Nginx: app.leaddrivecrm.org config ==="
            cat /etc/nginx/sites-enabled/app.leaddrivecrm.org 2>/dev/null || echo "not found"
            echo ""
            echo "=== What is on port 3001 ==="
            curl -sI http://localhost:3001/ 2>&1 | head -5
            echo ""
            echo "=== What is on port 3002 ==="
            curl -sI http://localhost:3002/ 2>&1 | head -5
            echo ""
            echo "=== PM2 list ==="
            pm2 list
            echo ""
            echo "=== Git log ==="
            cd /opt/leaddrive-v2 && git log --oneline -3
            echo ""
            echo "=== Server middleware on disk ==="
            head -5 /opt/leaddrive-v2/src/middleware.ts
          ENDSSH
