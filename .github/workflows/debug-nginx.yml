name: Debug Nginx

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== leaddrive.cloud config ==="
          cat -n /etc/nginx/sites-available/leaddrive.cloud

          echo "=== leaddrive-v2 config ==="
          cat -n /etc/nginx/sites-available/leaddrive-v2

          echo "=== mtm config ==="
          cat -n /etc/nginx/sites-enabled/mtm.leaddrivecrm.org

          echo "=== All server_name lines ==="
          grep -rn "server_name" /etc/nginx/sites-enabled/

          echo "=== DONE ==="
          ENDSCRIPT
