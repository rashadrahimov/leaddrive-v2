name: Debug Nginx

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== What listens on 443? ==="
          ss -tlnp | grep 443

          echo "=== Docker containers? ==="
          docker ps 2>/dev/null || echo "No docker"

          echo "=== iptables NAT rules? ==="
          iptables -t nat -L -n 2>/dev/null | head -30

          echo "=== nginx listen addresses ==="
          grep -rn "listen.*443" /etc/nginx/sites-enabled/ 2>/dev/null
          grep -rn "listen.*443" /etc/nginx/sites-available/ 2>/dev/null

          echo "=== Test external IP directly ==="
          curl -sSI --resolve leaddrivecrm.org:443:46.224.171.53 https://leaddrivecrm.org/ 2>&1 | head -5

          echo "=== DONE ==="
          ENDSCRIPT
