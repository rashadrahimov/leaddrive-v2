name: Debug Nginx

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== All enabled sites ==="
          ls -la /etc/nginx/sites-enabled/

          echo "=== leaddrivecrm.org config ==="
          cat -n /etc/nginx/sites-available/leaddrivecrm.org

          echo "=== All server blocks with leaddrivecrm ==="
          grep -rn "server_name.*leaddrivecrm" /etc/nginx/sites-enabled/ 2>/dev/null

          echo "=== Default and return blocks ==="
          grep -rn "default_server\|return 404" /etc/nginx/sites-enabled/ 2>/dev/null

          echo "=== PM2 list ==="
          pm2 list

          echo "=== Start leaddrive-v2 if missing ==="
          if ! pm2 describe leaddrive-v2 > /dev/null 2>&1; then
            echo "Starting leaddrive-v2..."
            cd /opt/leaddrive-v2
            PORT=3001 pm2 start npm --name leaddrive-v2 -- start 2>&1 | tail -3
            sleep 3
            pm2 save 2>/dev/null
          fi

          echo "=== Ports ==="
          curl -sI http://localhost:3001/ 2>&1 | head -3
          curl -sI http://localhost:3002/ 2>&1 | head -3

          echo "=== DONE ==="
          ENDSCRIPT
