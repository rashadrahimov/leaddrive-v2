name: Debug Nginx

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Debug from server
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== Test from server itself ==="
          curl -sSI --resolve leaddrivecrm.org:443:127.0.0.1 https://leaddrivecrm.org/ 2>&1 | head -10

          echo "=== Test port 3002 directly ==="
          curl -sSI http://127.0.0.1:3002/ 2>&1 | head -5

          echo "=== Check fanumsec config ==="
          cat /etc/nginx/sites-available/fanumsec

          echo "=== Check nginx.conf for include directives ==="
          grep -E "include|default" /etc/nginx/nginx.conf 2>/dev/null

          echo "=== Check if there are conf.d configs ==="
          ls /etc/nginx/conf.d/ 2>/dev/null

          echo "=== DONE ==="
          ENDSCRIPT
