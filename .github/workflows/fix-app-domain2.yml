name: Fix App Domain

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix All
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e
            rm -f /etc/nginx/sites-enabled/app.leaddrivecrm.org
            rm -f /etc/nginx/sites-available/app.leaddrivecrm.org

            cat > /etc/nginx/sites-available/app.leaddrivecrm.org << 'NGINX'
server {
    listen 80;
    server_name app.leaddrivecrm.org;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        client_max_body_size 50M;
    }
}
NGINX
            ln -sf /etc/nginx/sites-available/app.leaddrivecrm.org /etc/nginx/sites-enabled/
            nginx -t && nginx -s reload
            echo "Nginx OK"
            sleep 2
            certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos --email admin@leaddrivecrm.org --redirect 2>&1 | tail -10 || echo "Certbot failed"
            echo "=== Verify ==="
            curl -skI https://app.leaddrivecrm.org/ 2>&1 | head -5
            curl -sI https://leaddrivecrm.org/ 2>&1 | head -5
          ENDSSH
