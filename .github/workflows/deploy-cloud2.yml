name: Deploy Cloud v2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout leaddrive-cloud
        uses: actions/checkout@v4
        with:
          repository: rashadrahimov/leaddrive-cloud
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to server
        run: |
          rsync -avz --delete --exclude='node_modules' --exclude='.next' --exclude='.env' -e "ssh -i ~/.ssh/id_deploy" ./ root@${{ secrets.SERVER_IP }}:/opt/leaddrive-cloud/ 2>&1 | tail -10

      - name: Build and deploy
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          cd /opt/leaddrive-cloud

          echo "=== Setup .env ==="
          if [ ! -f .env ]; then
            cp /opt/leaddrive-v2/.env .env
          fi
          sed -i 's|NEXTAUTH_URL=.*|NEXTAUTH_URL="https://leaddrivecrm.org"|' .env
          grep NEXTAUTH_URL .env

          echo "=== Install ==="
          npm install 2>&1 | tail -5

          echo "=== Prisma ==="
          npx prisma generate 2>&1 | tail -3

          echo "=== Build ==="
          NODE_OPTIONS='--max-old-space-size=1536' npx next build 2>&1 | tail -15

          echo "=== Deploy ==="
          if [ -d .next/standalone ]; then
            cp -r .next/static .next/standalone/.next/static 2>/dev/null
            cp -r public .next/standalone/public 2>/dev/null
            cp .env .next/standalone/.env 2>/dev/null

            pm2 delete leaddrive-cloud 2>/dev/null
            cd .next/standalone
            PORT=3002 pm2 start server.js --name leaddrive-cloud 2>&1 | tail -3
          else
            pm2 delete leaddrive-cloud 2>/dev/null
            PORT=3002 pm2 start npm --name leaddrive-cloud -- start 2>&1 | tail -3
          fi

          sleep 3
          curl -sI http://localhost:3002/ 2>&1 | head -3
          pm2 save 2>/dev/null
          echo "=== DONE ==="
          ENDSCRIPT
