name: Fix Nginx

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix nginx configs
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          echo "=== Remove ALL symlinks and copy as real files ==="
          cd /etc/nginx/sites-enabled

          # Remove symlinks and copy actual files
          for f in leaddrive-v2 leaddrivecrm.org leaddrive.cloud; do
            if [ -L "$f" ]; then
              target=$(readlink -f "$f")
              rm "$f"
              cp "$target" "$f"
              echo "Converted symlink $f -> real file"
            fi
          done

          ls -la /etc/nginx/sites-enabled/

          echo "=== Verify leaddrivecrm.org is real file with correct content ==="
          head -20 /etc/nginx/sites-enabled/leaddrivecrm.org

          echo "=== Check all server_name lines now ==="
          grep -rn "server_name" /etc/nginx/sites-enabled/

          echo "=== Test nginx config ==="
          nginx -t 2>&1

          echo "=== Restart nginx ==="
          systemctl restart nginx

          echo "=== Test external ==="
          sleep 2
          curl -sI https://leaddrivecrm.org/ 2>&1 | head -5
          echo "---"
          curl -sI https://leaddrivecrm.org/home 2>&1 | head -3
          echo "---"
          curl -sI https://v2.leaddrivecrm.org/ 2>&1 | head -3

          echo "=== DONE ==="
          ENDSCRIPT
