name: Fix SSH Access

on:
  workflow_dispatch:

jobs:
  fix-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix SSH and show authorized_keys
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} bash -s << 'SCRIPT'
          echo "=== Current authorized_keys ==="
          cat ~/.ssh/authorized_keys
          echo ""
          echo "=== Adding key with comment ==="
          NEW_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL4kzjwjypjHGssxTAoGPGsbd5/fZC/2GsbTxILFmV4B rashadrahimov@Rashads-MacBook-Air.local"
          grep -v "AAAAIL4kzjwjypjHGssxTAoGPGsbd5" ~/.ssh/authorized_keys > /tmp/ak_tmp || true
          echo "$NEW_KEY" >> /tmp/ak_tmp
          cp /tmp/ak_tmp ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "=== Updated authorized_keys ==="
          cat ~/.ssh/authorized_keys
          echo ""
          echo "=== SSHD config check ==="
          grep -E "PubkeyAuthentication|AuthorizedKeysFile|PermitRootLogin" /etc/ssh/sshd_config | grep -v "^#"
          echo "=== Restarting sshd ==="
          systemctl restart sshd
          echo "Done"
          SCRIPT
