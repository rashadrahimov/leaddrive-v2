name: Fix All Domains

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix all
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          # Step 1: Write leaddrive-v2 config WITHOUT leading whitespace using printf
          printf 'server {\n    listen 80;\n    server_name v2.leaddrivecrm.org app.leaddrivecrm.org;\n\n    location /.well-known/acme-challenge/ {\n        root /var/www/html;\n    }\n\n    location / {\n        return 301 https://$host$request_uri;\n    }\n}\n\nserver {\n    listen 443 ssl;\n    server_name v2.leaddrivecrm.org app.leaddrivecrm.org;\n\n    ssl_certificate /etc/letsencrypt/live/v2.leaddrivecrm.org/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/v2.leaddrivecrm.org/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\n    location /marketing/ {\n        alias /opt/leaddrive-v2/public/marketing/;\n        expires 30d;\n        add_header Cache-Control "public, immutable";\n    }\n\n    location / {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400;\n        client_max_body_size 50M;\n        proxy_buffer_size 128k;\n        proxy_buffers 4 256k;\n        proxy_busy_buffers_size 256k;\n    }\n}\n' > /etc/nginx/sites-available/leaddrive-v2

          # Step 2: Verify no leading whitespace
          echo "=== First line of config ==="
          head -1 /etc/nginx/sites-available/leaddrive-v2 | cat -A

          # Step 3: Test
          nginx -t 2>&1
          systemctl reload nginx

          # Step 4: Create test file and test from both localhost and external
          mkdir -p /var/www/html/.well-known/acme-challenge
          echo "challenge_test_ok" > /var/www/html/.well-known/acme-challenge/testfile
          echo "=== Test localhost ==="
          curl -s -H "Host: app.leaddrivecrm.org" http://127.0.0.1/.well-known/acme-challenge/testfile
          echo "=== Test external ==="
          curl -s http://app.leaddrivecrm.org/.well-known/acme-challenge/testfile
          echo "=== Test external HTTP ==="
          curl -sI http://app.leaddrivecrm.org/ 2>&1 | head -3
          rm /var/www/html/.well-known/acme-challenge/testfile

          # Step 5: If external test works, try certbot
          echo "=== Certbot ==="
          certbot certonly --webroot -w /var/www/html -d app.leaddrivecrm.org --non-interactive --agree-tos -m admin@leaddrivecrm.org 2>&1

          # Step 6: If cert obtained, update config
          if [ -f /etc/letsencrypt/live/app.leaddrivecrm.org/fullchain.pem ]; then
            printf 'server {\n    listen 80;\n    server_name v2.leaddrivecrm.org app.leaddrivecrm.org;\n    return 301 https://$host$request_uri;\n}\n\nserver {\n    listen 443 ssl;\n    server_name v2.leaddrivecrm.org;\n\n    ssl_certificate /etc/letsencrypt/live/v2.leaddrivecrm.org/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/v2.leaddrivecrm.org/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\n    location / {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400;\n        client_max_body_size 50M;\n        proxy_buffer_size 128k;\n        proxy_buffers 4 256k;\n        proxy_busy_buffers_size 256k;\n    }\n}\n\nserver {\n    listen 443 ssl;\n    server_name app.leaddrivecrm.org;\n\n    ssl_certificate /etc/letsencrypt/live/app.leaddrivecrm.org/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/app.leaddrivecrm.org/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\n    location /marketing/ {\n        alias /opt/leaddrive-v2/public/marketing/;\n        expires 30d;\n        add_header Cache-Control "public, immutable";\n    }\n\n    location / {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400;\n        client_max_body_size 50M;\n        proxy_buffer_size 128k;\n        proxy_buffers 4 256k;\n        proxy_busy_buffers_size 256k;\n    }\n}\n' > /etc/nginx/sites-available/leaddrive-v2
            nginx -t 2>&1
            systemctl reload nginx
            echo "SSL cert obtained and configured!"
          else
            echo "No cert - keeping v2 cert for both"
          fi

          echo "=== Final test ==="
          curl -sI https://app.leaddrivecrm.org 2>&1 | head -5
          curl -sI https://leaddrivecrm.org 2>&1 | head -5
          echo "=== DONE ==="
          ENDSCRIPT
