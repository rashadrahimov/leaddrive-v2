name: Fix App Domain

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix app domain
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'SCRIPT'
          echo "=== Current leaddrive-v2 config ==="
          cat /etc/nginx/sites-available/leaddrive-v2
          echo ""

          echo "=== Check if app.leaddrivecrm.org file exists in sites-enabled ==="
          ls -la /etc/nginx/sites-enabled/app* 2>/dev/null || echo "No app config"

          echo "=== Add app.leaddrivecrm.org to leaddrive-v2 config ==="
          sed -i 's/server_name v2.leaddrivecrm.org;/server_name v2.leaddrivecrm.org app.leaddrivecrm.org;/' /etc/nginx/sites-available/leaddrive-v2

          echo "=== Also fix port 80 block ==="
          sed -i 's/server_name v2.leaddrivecrm.org;/server_name v2.leaddrivecrm.org app.leaddrivecrm.org;/' /etc/nginx/sites-available/leaddrive-v2

          echo "=== Remove standalone app config if exists ==="
          rm -f /etc/nginx/sites-enabled/app.leaddrivecrm.org
          rm -f /etc/nginx/sites-available/app.leaddrivecrm.org

          echo "=== Updated config ==="
          cat /etc/nginx/sites-available/leaddrive-v2
          echo ""

          echo "=== Test nginx ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Expand cert to include app.leaddrivecrm.org ==="
          certbot --nginx -d v2.leaddrivecrm.org -d app.leaddrivecrm.org --non-interactive --agree-tos --expand 2>&1 || echo "Certbot expand failed"

          echo "=== Reload ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Final config ==="
          cat /etc/nginx/sites-available/leaddrive-v2
          echo ""

          echo "=== Test external ==="
          curl -sI -H "Host: app.leaddrivecrm.org" http://127.0.0.1/ 2>&1 | head -3
          curl -sI -H "Host: app.leaddrivecrm.org" https://127.0.0.1/ -k 2>&1 | head -3
          echo "=== DONE ==="
          SCRIPT
