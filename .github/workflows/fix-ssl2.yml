name: Fix SSL v2

on:
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix SSL
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'SCRIPT'
          echo "=== Write proper nginx config without extra whitespace ==="
          printf 'server {\n    listen 80;\n    server_name app.leaddrivecrm.org;\n\n    location / {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400;\n        client_max_body_size 50M;\n        proxy_buffer_size 128k;\n        proxy_buffers 4 256k;\n        proxy_busy_buffers_size 256k;\n    }\n}\n' > /etc/nginx/sites-available/app.leaddrivecrm.org
          ln -sf /etc/nginx/sites-available/app.leaddrivecrm.org /etc/nginx/sites-enabled/app.leaddrivecrm.org

          echo "=== Test config ==="
          cat /etc/nginx/sites-available/app.leaddrivecrm.org
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Test challenge path manually ==="
          echo "test123" > /var/www/html/.well-known/acme-challenge/testfile
          curl -s http://app.leaddrivecrm.org/.well-known/acme-challenge/testfile 2>&1 || echo "Cannot access challenge"
          curl -sI http://app.leaddrivecrm.org/ 2>&1 | head -3

          echo "=== Try certbot with standalone ==="
          systemctl stop nginx
          certbot certonly --standalone -d app.leaddrivecrm.org --non-interactive --agree-tos -m admin@leaddrivecrm.org 2>&1 || echo "Standalone certbot failed"
          systemctl start nginx

          echo "=== Apply cert to nginx if exists ==="
          if [ -f /etc/letsencrypt/live/app.leaddrivecrm.org/fullchain.pem ]; then
            printf 'server {\n    listen 80;\n    server_name app.leaddrivecrm.org;\n    return 301 https://$host$request_uri;\n}\n\nserver {\n    listen 443 ssl;\n    server_name app.leaddrivecrm.org;\n\n    ssl_certificate /etc/letsencrypt/live/app.leaddrivecrm.org/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/app.leaddrivecrm.org/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\n    location / {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400;\n        client_max_body_size 50M;\n        proxy_buffer_size 128k;\n        proxy_buffers 4 256k;\n        proxy_busy_buffers_size 256k;\n    }\n}\n' > /etc/nginx/sites-available/app.leaddrivecrm.org
            nginx -t 2>&1
            systemctl reload nginx
            echo "SSL configured!"
          else
            echo "No cert obtained, keeping HTTP only"
          fi

          echo "=== Final test ==="
          curl -sI https://app.leaddrivecrm.org 2>&1 | head -5
          echo "=== DONE ==="
          SCRIPT
