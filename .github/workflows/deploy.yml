name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Setup Nginx and SSL
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e
            echo "=== Reload nginx ==="
            nginx -t && nginx -s reload
            echo "=== Get SSL for app.leaddrivecrm.org ==="
            certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos --email admin@leaddrivecrm.org --redirect 2>&1 | tail -10 || echo "Certbot attempt 1 failed"
            echo "=== Verify ==="
            curl -sI https://leaddrivecrm.org/ | head -3
            curl -sI https://app.leaddrivecrm.org/ 2>&1 | head -3
            pm2 list
          ENDSSH
