name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} "\
            cd /opt/leaddrive-v2 && \
            git pull origin main && \
            npx prisma generate 2>&1 | tail -2 && \
            npx prisma migrate deploy 2>&1 | tail -2 || true && \
            NODE_OPTIONS='--max-old-space-size=1536' ./node_modules/.bin/next build --webpack 2>&1 | tail -10 && \
            cp -r .next/static .next/standalone/.next/static 2>/dev/null; \
            cp -r .next/static .next/standalone/leaddrive-v2/.next/static 2>/dev/null; \
            cp -r node_modules/.prisma .next/standalone/node_modules/.prisma 2>/dev/null; \
            cp -r node_modules/@prisma .next/standalone/node_modules/@prisma 2>/dev/null; \
            pm2 delete leaddrive-v2 2>/dev/null; \
            pm2 start /tmp/start-leaddrive.sh --name leaddrive-v2 && \
            sleep 3 && \
            curl -sf http://localhost:3001 -o /dev/null && echo 'Health check OK' || echo 'Health check FAILED'"
