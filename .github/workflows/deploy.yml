name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy and SSL
        run: |
          sleep 60
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e

            # Restart leaddrive-v2
            cd /opt/leaddrive-v2
            pm2 restart leaddrive-v2 2>/dev/null || PORT=3001 pm2 start npm --name leaddrive-v2 -- start
            sleep 5
            curl -sf http://localhost:3001 -o /dev/null && echo 'v2 OK' || echo 'v2 FAILED'

            # SSL for app subdomain - certbot standalone mode to avoid nginx conflicts
            certbot certonly --standalone -d app.leaddrivecrm.org --non-interactive --agree-tos --email admin@leaddrivecrm.org --http-01-port 8888 2>&1 | tail -5 || true

            # Try nginx plugin
            certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos --email admin@leaddrivecrm.org --redirect 2>&1 | tail -5 || echo "nginx certbot failed"

            nginx -s reload 2>/dev/null || true

            echo "=== Final ==="
            curl -skI https://app.leaddrivecrm.org/ | head -3
            pm2 save
          ENDSSH
