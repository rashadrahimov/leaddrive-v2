name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (webpack for standalone)
        env:
          NEXTAUTH_SECRET: build-placeholder
          NEXTAUTH_URL: https://v2.leaddrivecrm.org
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npx next build --webpack

      - name: Copy static files into standalone
        run: |
          cp -r .next/static .next/standalone/leaddrive-v2/.next/static 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/static 2>/dev/null || true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy standalone to server
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_deploy" \
            .next/standalone/ \
            root@${{ secrets.SERVER_IP }}:/opt/leaddrive-v2/.next/standalone/

      - name: Deploy static files
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_deploy" \
            .next/static/ \
            root@${{ secrets.SERVER_IP }}:/opt/leaddrive-v2/.next/static/

      - name: Fix standalone structure + copy static + run migrations
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} "\
            if [ -d /opt/leaddrive-v2/.next/standalone/leaddrive-v2/.next ]; then \
              cp -r /opt/leaddrive-v2/.next/standalone/leaddrive-v2/.next/* /opt/leaddrive-v2/.next/standalone/.next/ 2>/dev/null; \
            fi && \
            cp -r /opt/leaddrive-v2/.next/static /opt/leaddrive-v2/.next/standalone/.next/static 2>/dev/null; \
            cp -r /opt/leaddrive-v2/.next/static /opt/leaddrive-v2/.next/standalone/leaddrive-v2/.next/static 2>/dev/null; \
            cd /opt/leaddrive-v2 && git pull origin main && \
            npx prisma generate 2>&1 | tail -2 && \
            npx prisma migrate deploy 2>&1 | tail -2 || true"

      - name: Restart PM2 + health check
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} "\
            pm2 delete leaddrive-v2 2>/dev/null; \
            pm2 start /tmp/start-leaddrive.sh --name leaddrive-v2 && sleep 4 && \
            HTTP=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001) && \
            echo \"Health check: HTTP \$HTTP\" && \
            [ \"\$HTTP\" != \"000\" ] || exit 1"
