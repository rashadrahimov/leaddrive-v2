name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            cd /opt/leaddrive-v2

            # Force pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install deps if needed
            npm ci --prefer-offline 2>&1 | tail -3

            # Generate prisma & run migrations
            npx prisma generate 2>&1 | tail -2
            npx prisma migrate deploy 2>&1 | tail -2 || true

            # Build
            NODE_OPTIONS='--max-old-space-size=1536' npx next build 2>&1 | tail -10

            # Stop old process
            pm2 delete leaddrive-v2 2>/dev/null || true
            fuser -k 3001/tcp 2>/dev/null || true
            sleep 2

            # Start with PM2
            cd /opt/leaddrive-v2
            PORT=3001 pm2 start npm --name leaddrive-v2 -- start

            sleep 3
            curl -sf http://localhost:3001 -o /dev/null && echo 'Health check OK' || echo 'Health check FAILED'
            pm2 save
          ENDSSH
