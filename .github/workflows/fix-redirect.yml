name: Fix Redirect

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix redirect
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'SCRIPT'
          echo "=== Fix port 80 block to redirect app.leaddrivecrm.org too ==="
          sed -i '/if (\$host = v2.leaddrivecrm.org)/,/}/c\    if ($host = v2.leaddrivecrm.org) {\n        return 301 https://$host$request_uri;\n    }\n    if ($host = app.leaddrivecrm.org) {\n        return 301 https://$host$request_uri;\n    }' /etc/nginx/sites-available/leaddrive-v2

          echo "=== Remove the return 404 ==="
          sed -i '/return 404; # managed by Certbot/d' /etc/nginx/sites-available/leaddrive-v2

          echo "=== Updated config ==="
          cat /etc/nginx/sites-available/leaddrive-v2

          echo "=== Test ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== Test HTTP redirect ==="
          curl -sI -H "Host: app.leaddrivecrm.org" http://127.0.0.1/ 2>&1 | head -5
          echo ""
          echo "=== Test HTTPS ==="
          curl -sI -H "Host: app.leaddrivecrm.org" https://127.0.0.1/ -k 2>&1 | head -5
          echo "=== DONE ==="
          SCRIPT
