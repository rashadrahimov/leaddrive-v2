name: Check Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fix middleware and rebuild
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} 'bash -s' << 'ENDSCRIPT'
          cd /opt/leaddrive-v2

          echo "=== Check if middleware needs fix ==="
          if grep -q "Marketing domain: root" src/middleware.ts; then
            echo "Root redirect already present"
          else
            echo "Adding root redirect for marketing domain..."
            sed -i '/Marketing domain: redirect CRM routes/i\  // Marketing domain: root → /home\n  if ((host === MARKETING_HOST || host === `www.${MARKETING_HOST}`) \&\& pathname === "/") {\n    return NextResponse.redirect(new URL("/home", req.url))\n  }\n' src/middleware.ts
            echo "Updated middleware:"
            grep -A 5 "Marketing domain: root" src/middleware.ts
          fi

          echo "=== Rebuild leaddrive-v2 ==="
          NODE_OPTIONS='--max-old-space-size=1536' npx next build 2>&1 | tail -10

          echo "=== Restart services ==="
          pm2 stop all 2>&1 | tail -3
          fuser -k 3001/tcp 2>/dev/null || true
          fuser -k 3002/tcp 2>/dev/null || true
          sleep 2
          pm2 delete leaddrive-v2 2>/dev/null || true
          pm2 delete leaddrive-cloud 2>/dev/null || true

          cd /opt/leaddrive-v2
          PORT=3001 pm2 start npm --name leaddrive-v2 -- start 2>&1 | tail -3
          sleep 3

          cd /opt/leaddrive-cloud/.next/standalone
          PORT=3002 pm2 start server.js --name leaddrive-cloud 2>&1 | tail -3
          sleep 3

          pm2 start brandbook 2>/dev/null || true
          pm2 start fanumsec 2>/dev/null || true

          echo "=== Final PM2 ==="
          pm2 list
          pm2 save 2>/dev/null

          echo "=== External tests ==="
          curl -sI https://leaddrivecrm.org/ 2>&1 | grep -i "HTTP\|location"
          echo "---"
          curl -sI https://leaddrivecrm.org/home 2>&1 | head -2
          echo "---"
          curl -sI https://v2.leaddrivecrm.org/ 2>&1 | grep -i "HTTP\|location"

          echo "=== DONE ==="
          ENDSCRIPT
