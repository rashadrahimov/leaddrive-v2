name: Check Database

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check DB and Docker
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} bash -s << 'SCRIPT'
          echo "=== DATABASE TABLES ==="
          sudo -u postgres psql -d leaddrive_v2 -c "SELECT schemaname, count(*) FROM pg_tables GROUP BY schemaname;" 2>&1
          echo ""
          echo "=== KEY TABLE ROW COUNTS ==="
          sudo -u postgres psql -d leaddrive_v2 -c "SELECT 'companies' as tbl, count(*) FROM \"Company\" UNION ALL SELECT 'contacts', count(*) FROM \"Contact\" UNION ALL SELECT 'deals', count(*) FROM \"Deal\" UNION ALL SELECT 'users', count(*) FROM \"User\";" 2>&1
          echo ""
          echo "=== DOCKER LOGS (last 50 lines) ==="
          docker logs --tail 50 leaddrive-v2 2>&1
          echo ""
          echo "=== NGINX SITES ==="
          ls /etc/nginx/sites-enabled/ 2>/dev/null
          echo ""
          echo "=== NGINX CONFIG FOR LEADDRIVE ==="
          cat /etc/nginx/sites-enabled/leaddrive* 2>/dev/null || cat /etc/nginx/sites-enabled/default 2>/dev/null || echo "No config found"
          echo ""
          echo "=== sshd_config.d ==="
          ls /etc/ssh/sshd_config.d/ 2>/dev/null
          for f in /etc/ssh/sshd_config.d/*.conf; do echo "--- $f ---"; cat "$f" 2>/dev/null; done
          echo "=== DONE ==="
          SCRIPT
