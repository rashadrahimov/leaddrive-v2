name: Setup Domains

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Setup domains
        run: |
          ssh -i ~/.ssh/id_deploy root@${{ secrets.SERVER_IP }} bash -s << 'SCRIPT'

          echo "=== 1. Revert leaddrivecrm.org back to port 3002 (landing page) ==="
          sed -i 's|proxy_pass http://127.0.0.1:3001;|proxy_pass http://127.0.0.1:3002;|g' /etc/nginx/sites-enabled/leaddrivecrm.org

          echo "=== 2. Create app.leaddrivecrm.org config ==="
          cat > /etc/nginx/sites-available/app.leaddrivecrm.org << 'NGINX'
          server {
              listen 80;
              server_name app.leaddrivecrm.org;

              location / {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 86400;
                  client_max_body_size 50M;

                  proxy_buffer_size 128k;
                  proxy_buffers 4 256k;
                  proxy_busy_buffers_size 256k;
              }
          }
          NGINX

          echo "=== 3. Enable the site ==="
          ln -sf /etc/nginx/sites-available/app.leaddrivecrm.org /etc/nginx/sites-enabled/app.leaddrivecrm.org

          echo "=== 4. Test nginx ==="
          nginx -t 2>&1

          echo "=== 5. Reload nginx ==="
          systemctl reload nginx

          echo "=== 6. Get SSL cert for app.leaddrivecrm.org ==="
          certbot --nginx -d app.leaddrivecrm.org --non-interactive --agree-tos --redirect 2>&1 || echo "Certbot failed"

          echo "=== 7. Final nginx test ==="
          nginx -t 2>&1
          systemctl reload nginx

          echo "=== 8. Test both sites ==="
          echo "--- app.leaddrivecrm.org (CRM on 3001) ---"
          curl -sI http://localhost:3001 2>&1 | head -3
          echo "--- leaddrivecrm.org (Landing on 3002) ---"
          curl -sI http://localhost:3002 2>&1 | head -3

          echo "=== DONE ==="
          SCRIPT
