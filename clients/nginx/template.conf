# Nginx config template for LeadDrive CRM client
# Replace: {{DOMAIN}}, {{PORT}}, {{APP_DIR}}
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/{{DOMAIN}}
#   2. Replace placeholders
#   3. ln -s /etc/nginx/sites-available/{{DOMAIN}} /etc/nginx/sites-enabled/
#   4. certbot --nginx -d {{DOMAIN}}
#   5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name {{DOMAIN}};

    # Redirect to HTTPS (certbot will add this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    # SSL certs (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:{{PORT}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static files cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:{{PORT}};
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public assets cache
    location /wallpapers/ {
        root {{APP_DIR}}/public;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Upload size limit
    client_max_body_size 50M;
}
