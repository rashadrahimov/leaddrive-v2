version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://leaddrive:leaddrive@db:5432/leaddrive
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - COMPUTE_SERVICE_URL=http://compute:8000
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/app/src
      - ./public:/app/public

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leaddrive
      POSTGRES_USER: leaddrive
      POSTGRES_PASSWORD: leaddrive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  compute:
    build: ./services/compute
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://leaddrive:leaddrive@db:5432/leaddrive
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - db
      - redis

  db-backup:
    image: prodrigestivill/postgres-backup-local
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: leaddrive
      POSTGRES_USER: leaddrive
      POSTGRES_PASSWORD: leaddrive
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
    volumes:
      - ./backups:/backups
    depends_on:
      - db

volumes:
  pgdata:
