# LeadDrive CRM — Nginx configuration
# Copy to /etc/nginx/sites-available/leaddrive and symlink to sites-enabled
# sudo ln -sf /etc/nginx/sites-available/leaddrive /etc/nginx/sites-enabled/leaddrive
# sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect for all domains
server {
    listen 80;
    server_name leaddrivecrm.org www.leaddrivecrm.org app.leaddrivecrm.org www.app.leaddrivecrm.org;
    return 301 https://$host$request_uri;
}

# Marketing site — leaddrivecrm.org
server {
    listen 443 ssl http2;
    server_name leaddrivecrm.org www.leaddrivecrm.org;

    ssl_certificate /etc/letsencrypt/live/leaddrivecrm.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leaddrivecrm.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js app (middleware handles domain-based routing)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# CRM application — app.leaddrivecrm.org
server {
    listen 443 ssl http2;
    server_name app.leaddrivecrm.org www.app.leaddrivecrm.org;

    ssl_certificate /etc/letsencrypt/live/app.leaddrivecrm.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.leaddrivecrm.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js app (middleware handles domain-based routing)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
